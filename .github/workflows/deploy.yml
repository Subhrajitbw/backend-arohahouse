name: Deploy Medusa Backend (Aroha House)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false # never cancel an in-flight deploy

env:
  NODE_VERSION: "20"
  APP_NAME: "medusa-aroha"
  DEPLOY_BASE: "/var/www/medusa"
  HEALTH_ENDPOINT: "http://localhost:9000/health"
  HEALTH_RETRIES: 5
  HEALTH_INTERVAL: 10
  KEEP_RELEASES: 5

jobs:
  # ── 1. CI ────────────────────────────────────────────────────────────────────
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Medusa
        run: npx medusa build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          if [ ! -f ".medusa/server/main.js" ]; then
            echo "❌ Build failed — main.js not found"
            exit 1
          fi
          echo "✅ Build verified"
          ls -lah .medusa/server

      - name: Create release bundle
        run: |
          BUNDLE_NAME="release-${{ github.sha }}.tar.gz"
          tar -czf $BUNDLE_NAME \
            .medusa \
            package.json \
            yarn.lock
          echo "BUNDLE_NAME=$BUNDLE_NAME" >> $GITHUB_ENV
          ls -lah $BUNDLE_NAME

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: medusa-bundle
          path: release-${{ github.sha }}.tar.gz
          retention-days: 3

  # ── 2. DEPLOY ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: medusa-bundle

      - name: Upload bundle to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "release-${{ github.sha }}.tar.gz"
          target: "${{ env.DEPLOY_BASE }}/incoming"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          command_timeout: "25m"
          script: |
            set -euo pipefail

            # ── CONFIG ──────────────────────────────────────────────────────
            APP_NAME="${{ env.APP_NAME }}"
            BASE="${{ env.DEPLOY_BASE }}"
            RELEASES="$BASE/releases"
            CURRENT="$BASE/current"
            SHARED="$BASE/shared"
            INCOMING="$BASE/incoming"
            SHA="${{ github.sha }}"
            NEW_RELEASE="$RELEASES/$SHA"
            BUNDLE="$INCOMING/release-$SHA.tar.gz"
            KEEP_RELEASES="${{ env.KEEP_RELEASES }}"

            # ── HELPERS ─────────────────────────────────────────────────────
            log()  { echo "[$(date '+%H:%M:%S')] $*"; }
            fail() { echo "❌ $*" >&2; exit 1; }

            rollback() {
              log "⏪ Rolling back..."
              PREV=$(ls -dt "$RELEASES"/*/  2>/dev/null | sed -n '2p')
              if [ -n "$PREV" ]; then
                pm2 delete "$APP_NAME-canary" 2>/dev/null || true
                ln -sfn "$PREV" "$CURRENT"
                cd "$PREV/.medusa/server"
                pm2 restart "$APP_NAME" 2>/dev/null \
                  || pm2 start main.js --name "$APP_NAME" \
                       --max-memory-restart 800M \
                       --node-args="--max-old-space-size=768"
                pm2 save
                log "✅ Rolled back to $PREV"
              else
                log "⚠️  No previous release to roll back to"
              fi
            }
            trap 'rollback' ERR

            # ── DIRECTORY SETUP ─────────────────────────────────────────────
            mkdir -p "$RELEASES" "$SHARED" "$INCOMING"

            # ── EXTRACT ─────────────────────────────────────────────────────
            log "📦 Extracting $SHA..."
            [ -f "$BUNDLE" ] || fail "Bundle not found: $BUNDLE"
            mkdir -p "$NEW_RELEASE"
            tar -xzf "$BUNDLE" -C "$NEW_RELEASE"
            rm -f "$BUNDLE"

            # ── SHARED .env (written once, symlinked every deploy) ──────────
            ENV_FILE="$SHARED/.env.production"
            if [ ! -f "$ENV_FILE" ]; then
              log "📝 Writing shared .env.production (first time)..."
              printf '%s' '${{ secrets.PROD_ENV_FILE }}' > "$ENV_FILE"
              chmod 600 "$ENV_FILE"
            fi
            ln -sf "$ENV_FILE" "$NEW_RELEASE/.medusa/server/.env.production"

            # ── INSTALL DEPS ─────────────────────────────────────────────────
            log "📦 Installing production dependencies..."
            cd "$NEW_RELEASE/.medusa/server"
            sudo corepack enable
            yarn install --immutable --production 2>&1 | tail -5

            # ── LOAD ENV ─────────────────────────────────────────────────────
            set -a
            source .env.production
            set +a
            export NODE_ENV=production
            export MEDUSA_WORKER_MODE=server

            # ── MIGRATIONS ──────────────────────────────────────────────────
            log "🗄️  Running DB migrations..."
            npx medusa db:migrate --execute-safe-links \
              || fail "Migration failed — aborting deploy"

            # ── CANARY START ─────────────────────────────────────────────────
            log "🚀 Starting canary process..."
            pm2 delete "$APP_NAME-canary" 2>/dev/null || true
            pm2 start main.js \
              --name "$APP_NAME-canary" \
              --max-memory-restart 800M \
              --node-args="--max-old-space-size=768" \
              --env production \
              --merge-logs \
              --log "$BASE/logs/$APP_NAME.log" \
              --error "$BASE/logs/$APP_NAME-error.log"

            # ── HEALTH CHECK ─────────────────────────────────────────────────
            log "🧪 Health checking (up to ${{ env.HEALTH_RETRIES }} attempts)..."
            mkdir -p "$BASE/logs"
            HEALTH_OK=false
            for i in $(seq 1 ${{ env.HEALTH_RETRIES }}); do
              sleep ${{ env.HEALTH_INTERVAL }}
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 "${{ env.HEALTH_ENDPOINT }}" || echo "000")
              log "  Attempt $i → HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTH_OK=true
                break
              fi
            done

            if [ "$HEALTH_OK" != "true" ]; then
              log "📋 Canary logs:"
              pm2 logs "$APP_NAME-canary" --lines 80 --nostream
              fail "Health check failed after ${{ env.HEALTH_RETRIES }} attempts"
            fi

            # ── CUTOVER ──────────────────────────────────────────────────────
            log "🔁 Cutting over traffic..."
            pm2 delete "$APP_NAME" 2>/dev/null || true
            pm2 restart "$APP_NAME-canary" --name "$APP_NAME"
            ln -sfn "$NEW_RELEASE" "$CURRENT"
            pm2 save

            # ── CLEANUP ──────────────────────────────────────────────────────
            log "🧹 Pruning old releases (keeping $KEEP_RELEASES)..."
            ls -dt "$RELEASES"/*/  2>/dev/null \
              | tail -n +$((KEEP_RELEASES + 1)) \
              | xargs rm -rf || true

            log "✅ Deploy $SHA complete"
