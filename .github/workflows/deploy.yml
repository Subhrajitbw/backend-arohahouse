name: Deploy Aroha House Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      - name: Build Project (on GitHub)
        run: |
          # Install all dependencies including dev ones for the build
          yarn install --immutable
          # This generates the .medusa/server directory
          yarn build
        env:
          NODE_ENV: production

      - name: Prepare Production Bundle
        run: |
          # 1. Copy necessary files into the server folder for a standalone app
          cp package.json .medusa/server/package.json
          cp yarn.lock .medusa/server/yarn.lock
          cp .yarnrc.yml .medusa/server/.yarnrc.yml

          # 2. Prune dev-dependencies so the EC2 doesn't have to carry weight
          cd .medusa/server
          yarn workspaces focus --production

          # 3. Bundle the contents of .medusa/server into a single archive
          tar -czf ../../build.tar.gz .

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/medusa

            # Extract the ready-to-run bundle (overwrites old files)
            tar -xzf build.tar.gz
            rm build.tar.gz

            # Inject production environment variables from Secret
            echo "${{ secrets.PROD_ENV_FILE }}" > .env.production

            # Run DB migrations (Low overhead task)
            npx medusa db:migrate

            # Manage PM2 Process
            # We use 'yarn start' which points to your 'medusa start' script
            if pm2 describe medusa >/dev/null 2>&1; then
              echo "Reloading existing Medusa process..."
              pm2 reload medusa
            else
              echo "Starting new Medusa process..."
              pm2 start yarn --name "medusa" -- start
            fi
            pm2 save
