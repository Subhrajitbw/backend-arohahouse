name: Deploy Medusa v2 (Atomic & Optimized)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Medusa
        run: yarn build
        env:
          NODE_ENV: production

      - name: Create Slim Bundle
        # We package the built server and config. Exclude node_modules to keep the transfer tiny.
        run: |
          tar -czf build.tar.gz \
            .medusa/server \
            package.json \
            medusa-config.ts \
            yarn.lock \
            .yarnrc.yml

      - name: Upload to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa/tmp"

      - name: Atomic Deploy & Health Check
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export NODE_OPTIONS="--max-old-space-size=512"
            
            BASE_DIR="/var/www/medusa"
            TIMESTAMP=$(date +%s)
            RELEASE_DIR="$BASE_DIR/releases/$TIMESTAMP"
            
            mkdir -p $RELEASE_DIR
            mkdir -p $BASE_DIR/shared/node_modules

            # 1. Extract
            tar -xzf $BASE_DIR/tmp/build.tar.gz -C $RELEASE_DIR
            rm $BASE_DIR/tmp/build.tar.gz

            # 2. Environment & Symlink Shared Cache
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env
            ln -s $BASE_DIR/shared/node_modules $RELEASE_DIR/node_modules

            # 3. Optimized Install
            cd $RELEASE_DIR
            corepack enable
            yarn install --production --immutable

            # 4. Database Migrations (Medusa v2)
            npx medusa db:migrate

            # 5. Zero-Downtime Health Check
            # Start a temporary instance on an alternate port to verify build integrity
            cd .medusa/server
            PORT=9999 yarn start > health_log.txt 2>&1 &
            HEALTH_PID=$!
            
            echo "Waiting for health check..."
            sleep 15 # Medusa v2 needs a moment to boot modules
            
            if curl -s http://localhost:9999/health | grep -q '"status":"ok"'; then
               echo "✅ Health check passed!"
               kill $HEALTH_PID || true
            else
               echo "❌ Health check failed! Logs:"
               cat health_log.txt
               kill $HEALTH_PID || true
               rm -rf $RELEASE_DIR
               exit 1
            fi

            # 6. Atomic Swap
            ln -sfn $RELEASE_DIR $BASE_DIR/current

            # 7. PM2 Reload (Zero Downtime)
            # Pointing PM2 to the symlink means we don't have to update the PM2 config daily
            cd $BASE_DIR/current/.medusa/server
            if pm2 describe medusa >/dev/null 2>&1; then
              pm2 reload medusa --update-env
            else
              pm2 start "node dist/index.js" --name "medusa" --exp-backoff-restart-delay 100
            fi
            pm2 save

            # 8. Storage Optimization (Cleanup)
            # Keep only last 3 versions
            cd $BASE_DIR/releases
            ls -1t | tail -n +4 | xargs rm -rf || true
            
            # Clean global yarn cache to free up GBs
            yarn cache clean
            
            echo "🚀 Deployment of version $TIMESTAMP successful!"