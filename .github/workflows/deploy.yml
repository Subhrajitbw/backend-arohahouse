name: Deploy Medusa Backend (Zero Downtime + Rollback Safe)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup Node
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------
      # 3. Enable Yarn
      # -----------------------------
      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      # -----------------------------
      # 4. Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: yarn install --immutable

      # -----------------------------
      # 5. Build Medusa
      # -----------------------------
      - name: Build Medusa
        run: yarn build
        env:
          NODE_ENV: production

      # -----------------------------
      # 6. Create bundle
      # -----------------------------
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json

      # -----------------------------
      # 7. Upload to EC2
      # -----------------------------
      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      # -----------------------------
      # 8. Deploy (Zero Downtime)
      # -----------------------------
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current

            mkdir -p $RELEASES
            cd $BASE

            echo "📦 Creating new release..."
            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            mkdir -p $NEW_RELEASE

            tar -xzf build.tar.gz -C $NEW_RELEASE
            rm build.tar.gz

            cd $NEW_RELEASE

            echo "⚙️ Writing env..."
            cat << 'EOF' > .env
            ${{ secrets.PROD_ENV_FILE }}
            EOF

            echo "🌍 Loading env..."
            export NODE_ENV=production
            set -a
            source .env
            set +a

            echo "🗄️ Running migrations..."
            if ! npx medusa db:migrate; then
              echo "❌ Migration failed → rollback"
              exit 1
            fi

            echo "🚀 Starting NEW instance (temp)..."
            pm2 start ./node_modules/.bin/medusa \
              --name medusa-temp \
              -- start

            sleep 6

            echo "🧪 Health check..."
            if ! curl -f http://localhost:9000/health; then
              echo "❌ Health check failed → rollback"
              pm2 delete medusa-temp
              exit 1
            fi

            echo "🔁 Switching to new version..."

            # Stop old AFTER new is healthy
            pm2 delete medusa || true

            # Rename temp → main
            pm2 restart medusa-temp --name medusa

            # Switch symlink
            ln -sfn $NEW_RELEASE $CURRENT

            pm2 save

            echo "🧹 Cleaning old releases..."
            ls -dt $RELEASES/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Deploy complete (zero downtime)"
