name: Deploy Aroha House Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          # DO NOT use cache: 'yarn' here, it triggers the Yarn 1 error

      - name: Enable Corepack & Force Yarn 4.7.0
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate
          yarn --version # This should now output 4.7.0

      - name: Build Project (on GitHub)
        run: |
          yarn install --immutable
          yarn build
        env:
          NODE_ENV: production

      - name: Prepare Production Bundle
        run: |
          cp package.json .medusa/server/package.json
          cp yarn.lock .medusa/server/yarn.lock
          cp .yarnrc.yml .medusa/server/.yarnrc.yml
          cd .medusa/server
          yarn workspaces focus --production
          tar -czf ../../build.tar.gz .

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/medusa
            tar -xzf build.tar.gz
            rm build.tar.gz
            echo "${{ secrets.PROD_ENV_FILE }}" > .env

            # Since you enabled Corepack on EC2 already, this will work
            npx medusa db:migrate

            if pm2 describe medusa >/dev/null 2>&1; then
              pm2 reload medusa
            else
              pm2 start yarn --name "medusa" -- start
            fi
            pm2 save
