name: Deploy Medusa Backend (Aroha House)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Medusa
        run: npx medusa build

      - name: Verify build output
        run: |
          if [ ! -f ".medusa/server/main.js" ]; then
            echo "Build output missing — aborting"
            exit 1
          fi

      # Bundle includes yarn.lock so the server install is fully deterministic
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            package.json \
            yarn.lock

      - name: Upload bundle to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current
            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            SERVER_DIR=$NEW_RELEASE/.medusa/server

            # ── Preserve the previous release path for rollback ──────────────
            PREV_RELEASE=$(readlink -f "$CURRENT" 2>/dev/null || true)

            rollback() {
              echo "❌ Deploy failed — rolling back"
              pm2 delete medusa-temp 2>/dev/null || true
              if [ -n "$PREV_RELEASE" ] && [ -d "$PREV_RELEASE" ]; then
                ln -sfn "$PREV_RELEASE" "$CURRENT"
                echo "↩️  Restored symlink to $PREV_RELEASE"
              fi
              rm -rf "$NEW_RELEASE"
              exit 1
            }
            trap rollback ERR

            # ── Prepare release directory ─────────────────────────────────────
            mkdir -p "$RELEASES"
            mkdir -p "$NEW_RELEASE"

            echo "📦 Extracting bundle..."
            tar -xzf "$BASE/build.tar.gz" -C "$NEW_RELEASE"
            rm "$BASE/build.tar.gz"

            # ── Install production deps ───────────────────────────────────────
            cd "$SERVER_DIR"
            echo "📦 Installing dependencies..."
            sudo corepack enable
            yarn install --frozen-lockfile --production

            # ── Write env file (never echo secrets into the log) ─────────────
            echo "⚙️  Writing env..."
            # Write without any shell expansion of the secret content
            printf '%s' "${{ secrets.PROD_ENV_FILE }}" > .env.production
            chmod 600 .env.production

            # Load env for the remaining steps in this block
            set -a
            source .env.production
            set +a
            export NODE_ENV=production
            export MEDUSA_WORKER_MODE=server

            # ── Migrations ───────────────────────────────────────────────────
            echo "🗄️  Running migrations..."
            npx medusa db:migrate --execute-safe-links

            # ── Start a canary process for health check ───────────────────────
            echo "🚀 Starting canary process..."
            pm2 delete medusa-temp 2>/dev/null || true
            pm2 start main.js \
              --name medusa-temp \
              --env production

            # ── Retry health check (10 attempts × 5 s = 50 s window) ─────────
            echo "🧪 Waiting for health check..."
            ATTEMPTS=10
            for i in $(seq 1 $ATTEMPTS); do
              if curl -sf http://localhost:9000/health > /dev/null; then
                echo "✅ Health check passed (attempt $i)"
                break
              fi
              if [ "$i" -eq "$ATTEMPTS" ]; then
                echo "❌ Health check failed after $ATTEMPTS attempts"
                pm2 logs medusa-temp --lines 150 --nostream
                exit 1   # triggers rollback trap
              fi
              echo "   Attempt $i/$ATTEMPTS — retrying in 5 s..."
              sleep 5
            done

            # ── Zero-downtime swap ────────────────────────────────────────────
            echo "🔁 Swapping to new release..."
            # reload keeps existing connections alive during the swap
            pm2 reload medusa-temp --update-env
            pm2 rename medusa-temp medusa 2>/dev/null || \
              pm2 reload medusa --update-env   # already named medusa from a prior deploy

            ln -sfn "$NEW_RELEASE" "$CURRENT"
            pm2 save

            # ── Prune old releases (keep the last 3) ─────────────────────────
            echo "🧹 Pruning old releases..."
            ls -dt "$RELEASES"/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Deploy complete — release $TS is live"
