name: Deploy Aroha Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack & Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Project
        # This compiles the server and the admin dashboard
        run: yarn build
        env:
          NODE_ENV: production

      - name: Prepare Production Artifacts
        run: |
          # Use the compiled JS config for the production runtime
          cp .medusa/server/medusa-config.js ./medusa-config.js

          # Verify that the admin build exists (In v2 it's usually in server/public/admin)
          if [ -d ".medusa/server/public/admin" ]; then
            echo "✅ Admin build found in server/public/admin"
          elif [ -d ".medusa/admin" ]; then
            echo "✅ Admin build found in .medusa/admin"
          else
            echo "❌ Admin build missing! Check medusa-config.ts"
            exit 1
          fi

      - name: Prune to Production Dependencies
        # This keeps the bundle small and the EC2 RAM usage low
        run: yarn workspaces focus --all --production

      - name: Create Deployment Bundle
        # We ship ONLY the build, runtime deps, and the JS config. No source code.
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json \
            medusa-config.js

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/aroha"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/aroha

            echo "📦 Extracting new release..."
            mkdir -p releases
            TIMESTAMP=$(date +%s)
            RELEASE_DIR="releases/$TIMESTAMP"
            mkdir -p $RELEASE_DIR

            tar -xzf build.tar.gz -C $RELEASE_DIR
            rm build.tar.gz

            echo "⚙️ Setting environment..."
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env
            cp $RELEASE_DIR/.env $RELEASE_DIR/.medusa/server/.env

            echo "🔗 Switching symlink..."
            # Atomic swap: 'current' now points to the new release
            ln -sfn $RELEASE_DIR current

            echo "🗄 Running migrations..."
            cd current
            ./node_modules/.bin/medusa db:migrate

            echo "🚀 Restarting PM2..."
            # Using the project name 'aroha'
            pm2 delete aroha || true

            # Start via the 'current' path for absolute reliability
            # --max-memory-restart 800M prevents T3.micro crashes
            pm2 start ./node_modules/.bin/medusa --name aroha --max-memory-restart 800M -- start
            pm2 save

            echo "🧹 Cleaning old releases (keeping last 3)..."
            ls -dt releases/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Aroha deployment complete!"
