name: Deploy Aroha House Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack & Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Project
        run: yarn build
        env:
          NODE_ENV: production

      - name: Prune to Production Dependencies
        run: yarn workspaces focus --all --production

      - name: Create Production Bundle
        # CRITICAL: Added 'src' folder because your config references it for modules.
        # Included 'medusa-config.ts' and '.medusa' build folder.
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json \
            medusa-config.ts \
            src

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/medusa

            echo "📦 Preparing release..."
            mkdir -p releases
            # Use a variable for the timestamp to ensure consistency throughout the script
            TIMESTAMP=$(date +%s)
            RELEASE_DIR="releases/$TIMESTAMP"
            mkdir -p $RELEASE_DIR

            # Extract the bundle
            tar -xzf build.tar.gz -C $RELEASE_DIR
            rm build.tar.gz

            echo "⚙️ Setting environment..."
            # Injecting the production secret into the new release folder
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env
            # Standard practice for Medusa v2 loaders
            cp $RELEASE_DIR/.env $RELEASE_DIR/.medusa/server/.env

            echo "🔗 Switching to new release..."
            # Update the symlink 'current' to point to the fresh release
            ln -sfn $RELEASE_DIR current

            echo "🗄 Running migrations..."
            cd current
            # Use the local Medusa binary to ensure version parity
            ./node_modules/.bin/medusa db:migrate

            echo "🚀 Restarting PM2..."
            # We delete and start to ensure no memory leakage or ghost processes
            pm2 delete medusa || true

            # Start the server using the compiled Medusa CLI
            # --max-memory-restart protects your T3.micro from OOM crashes
            pm2 start ./node_modules/.bin/medusa --name medusa --max-memory-restart 800M -- start
            pm2 save

            echo "🧹 Cleaning old releases (Keeping latest 3)..."
            ls -dt releases/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Aroha House is Live!"
