name: Deploy Aroha Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack & Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Project
        run: yarn build
        env:
          NODE_ENV: production

      - name: Prepare Production Artifacts
        run: |
          # Use the compiled JS config
          cp .medusa/server/medusa-config.js ./medusa-config.js

          # Verify Admin build
          if [ -d ".medusa/server/public/admin" ]; then
            echo "✅ Admin found in server/public"
          elif [ -d ".medusa/admin" ]; then
            echo "✅ Admin found in .medusa/admin"
          else
            echo "❌ Admin missing"
            exit 1
          fi

      - name: Prune to Production Dependencies
        run: yarn workspaces focus --all --production

      - name: Create Deployment Bundle
        # We re-include 'src' because Medusa v2 needs it to resolve module paths
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json \
            medusa-config.js \
            src

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/aroha"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/aroha

            TIMESTAMP=$(date +%s)
            RELEASE_DIR="releases/$TIMESTAMP"
            mkdir -p $RELEASE_DIR

            tar -xzf build.tar.gz -C $RELEASE_DIR
            rm build.tar.gz

            echo "⚙️ Setting environment..."
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env
            cp $RELEASE_DIR/.env $RELEASE_DIR/.medusa/server/.env

            echo "🔗 Switching symlink..."
            ln -sfn $RELEASE_DIR current

            echo "🗄 Running migrations..."
            cd current

            # CRITICAL: We prepend NODE_ENV=production to stop Medusa from looking for ts-node
            export NODE_ENV=production
            ./node_modules/.bin/medusa db:migrate

            echo "🚀 Restarting PM2..."
            pm2 delete aroha || true

            # Start with production flag and memory limits
            NODE_ENV=production pm2 start ./node_modules/.bin/medusa --name aroha --max-memory-restart 800M -- start
            pm2 save

            echo "🧹 Cleaning old releases..."
            ls -dt releases/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Aroha is Live!"
