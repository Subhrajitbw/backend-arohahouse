name: Deploy Aroha House Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Forces GitHub to use the modern Node 24 runner to avoid deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Enable Corepack & Force Yarn 4.7.0
        run: |
          # Enable corepack shims
          corepack enable
          # Force the runner to download and use the specific Yarn version from your package.json
          corepack prepare yarn@4.7.0 --activate
          # Verify the runner is now seeing the correct version
          yarn --version

      - name: Build Project (on GitHub)
        run: |
          yarn install --immutable
          yarn build
        env:
          NODE_ENV: production

      - name: Prepare Standalone Production Bundle
        run: |
          # 1. Copy essential files for the standalone server
          cp package.json .medusa/server/package.json
          cp yarn.lock .medusa/server/yarn.lock
          cp .yarnrc.yml .medusa/server/.yarnrc.yml

          # 2. Prune dev-dependencies on GitHub (keeps the upload small)
          cd .medusa/server
          yarn workspaces focus --production

          # 3. Archive the contents of the server folder
          tar -czf ../../build.tar.gz .

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/medusa

            # Extract the ready-to-run bundle
            tar -xzf build.tar.gz
            rm build.tar.gz

            # Inject production ENV
            echo "${{ secrets.PROD_ENV_FILE }}" > .env.production

            # Run migrations (Safe to run on EC2 with your 2GB swap)
            npx medusa db:migrate

            # Start or Reload with PM2
            if pm2 describe medusa >/dev/null 2>&1; then
              pm2 reload medusa
            else
              pm2 start yarn --name "medusa" -- start
            fi
            pm2 save
