name: Deploy Aroha House Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack & Force Yarn 4.7.0
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Install & Build (on GitHub)
        run: |
          yarn install --immutable
          yarn build
        env:
          NODE_ENV: production

      # CHANGED: We ship the root config and the build folder together.
      # No more 'workspaces focus' inside the build folder.
      - name: Create Bundle
        run: |
          tar -czf build.tar.gz .medusa package.json yarn.lock .yarnrc.yml

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/medusa

            # 1. Atomic Cleanup: Prevents "Ghost Entities" from old builds
            rm -rf .medusa package.json yarn.lock .yarnrc.yml

            # 2. Extract fresh artifact
            tar -xzf build.tar.gz
            rm build.tar.gz

            # 3. Environment Setup
            echo "${{ secrets.PROD_ENV_FILE }}" > .env
            cp .env .medusa/server/.env

            # 4. Root Install: Safe and stable for the dependency graph
            corepack enable
            yarn install --production

            # 5. DB Migrations
            npx medusa db:migrate

            # 6. PM2 Management: Clean reboot using the Medusa CLI
            pm2 delete medusa || true
            pm2 start "npx medusa start" --name "medusa"
            pm2 save
