name: Deploy Aroha House Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # This env variable opts into the new Node 24 runtime now
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Upgraded to 24 to match GitHub's 2026 standards
          cache: "yarn"

      - name: Enable Corepack
        # We run this BEFORE 'yarn install' to ensure Yarn 4.7.0 is used
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Build Project (on GitHub)
        run: |
          yarn install --immutable
          yarn build
        env:
          NODE_ENV: production

      - name: Prepare Production Bundle
        run: |
          # 1. Prepare standalone server folder
          cp package.json .medusa/server/package.json
          cp yarn.lock .medusa/server/yarn.lock
          cp .yarnrc.yml .medusa/server/.yarnrc.yml

          # 2. Prune dev-dependencies on GitHub
          cd .medusa/server
          yarn workspaces focus --production

          # 3. Bundle the contents
          tar -czf ../../build.tar.gz .

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/medusa

            # Extract build
            tar -xzf build.tar.gz
            rm build.tar.gz

            # Inject production ENV
            echo "${{ secrets.PROD_ENV_FILE }}" > .env.production

            # Run migrations
            npx medusa db:migrate

            # PM2 Management
            if pm2 describe medusa >/dev/null 2>&1; then
              pm2 reload medusa
            else
              pm2 start yarn --name "medusa" -- start
            fi
            pm2 save
