name: Deploy Aroha Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js & Yarn
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Build
        run: |
          yarn install --immutable
          yarn build
        env:
          NODE_ENV: production

      - name: Bundle
        run: |
          cp .medusa/server/medusa-config.js ./medusa-config.js
          # We include 'src' one last time to satisfy the module loader
          tar -czf build.tar.gz .medusa node_modules package.json medusa-config.js src

      - name: Copy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/aroha"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🏁 Starting SSH script..."
            set -e

            # Ensure the directory exists
            mkdir -p /var/www/aroha/releases
            cd /var/www/aroha

            TIMESTAMP=$(date +%s)
            RELEASE_DIR="/var/www/aroha/releases/$TIMESTAMP"
            mkdir -p $RELEASE_DIR

            echo "📦 Extracting to $RELEASE_DIR..."
            tar -xzf build.tar.gz -C $RELEASE_DIR
            rm build.tar.gz

            echo "⚙️  Injecting .env..."
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env
            cp $RELEASE_DIR/.env $RELEASE_DIR/.medusa/server/.env

            echo "🔗 Updating symlink..."
            # Use absolute paths for the symlink to avoid resolution errors
            ln -sfn $RELEASE_DIR /var/www/aroha/current

            echo "🗄️ Running Migrations..."
            cd /var/www/aroha/current
            export NODE_ENV=production
            # Use the full path to the binary
            ./node_modules/.bin/medusa db:migrate

            echo "🚀 PM2 Update..."
            pm2 delete aroha || true
            NODE_ENV=production pm2 start ./node_modules/.bin/medusa --name aroha --max-memory-restart 800M -- start
            pm2 save

            echo "✅ Deployment successful!"
