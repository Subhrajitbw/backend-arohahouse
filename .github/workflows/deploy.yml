name: Deploy Medusa Backend (Aroha House)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Medusa
        run: npx medusa build

      - name: Verify build output
        run: |
          if [ ! -d ".medusa/server" ]; then
            echo "❌ .medusa/server directory missing — build failed"
            exit 1
          fi
          echo "✅ Build output looks good"
          ls -la .medusa/server

      # Bundle includes yarn.lock so the server install is fully deterministic
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            package.json \
            yarn.lock

      - name: Upload bundle to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current
            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            SERVER_DIR=$NEW_RELEASE/.medusa/server

            # ── Preserve previous release path for rollback ───────────────────
            PREV_RELEASE=$(readlink -f "$CURRENT" 2>/dev/null || true)

            rollback() {
              echo "❌ Deploy failed — rolling back"
              pm2 delete medusa-temp 2>/dev/null || true
              if [ -n "$PREV_RELEASE" ] && [ -d "$PREV_RELEASE" ]; then
                ln -sfn "$PREV_RELEASE" "$CURRENT"
                echo "↩️  Restored symlink to $PREV_RELEASE"
              fi
              rm -rf "$NEW_RELEASE"
              exit 1
            }
            trap rollback ERR

            # ── Extract ───────────────────────────────────────────────────────
            mkdir -p "$RELEASES" "$NEW_RELEASE"
            echo "📦 Extracting bundle..."
            tar -xzf "$BASE/build.tar.gz" -C "$NEW_RELEASE"
            rm "$BASE/build.tar.gz"

            # ── Install production deps ───────────────────────────────────────
            cd "$SERVER_DIR"
            echo "📦 Installing dependencies..."
            sudo corepack enable
            yarn install --frozen-lockfile --production

            # ── Write env file securely ───────────────────────────────────────
            echo "⚙️  Writing env..."
            printf '%s' "${{ secrets.PROD_ENV_FILE }}" > .env.production
            chmod 600 .env.production

            # Load env for migration step
            set -a
            source .env.production
            set +a
            export NODE_ENV=production
            export MEDUSA_WORKER_MODE=server

            # ── Migrations ───────────────────────────────────────────────────
            echo "🗄️  Running migrations..."
            npx medusa db:migrate --execute-safe-links

            # ── Start canary process ──────────────────────────────────────────
            # Medusa v2 has no main.js — the entry point is the medusa CLI
            echo "🚀 Starting canary process..."
            pm2 delete medusa-temp 2>/dev/null || true
            pm2 start npx \
              --name medusa-temp \
              --env production \
              -- medusa start

            # ── Health check with retry (10 × 5 s = 50 s window) ─────────────
            echo "🧪 Waiting for health check..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:9000/health > /dev/null; then
                echo "✅ Health check passed (attempt $i)"
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "❌ Health check failed after 10 attempts"
                pm2 logs medusa-temp --lines 150 --nostream
                exit 1
              fi
              echo "   Attempt $i/10 — retrying in 5 s..."
              sleep 5
            done

            # ── Zero-downtime swap ────────────────────────────────────────────
            echo "🔁 Swapping to new release..."
            if pm2 describe medusa > /dev/null 2>&1; then
              pm2 delete medusa
            fi
            pm2 restart medusa-temp --name medusa
            ln -sfn "$NEW_RELEASE" "$CURRENT"
            pm2 save

            # ── Prune old releases (keep last 3) ──────────────────────────────
            echo "🧹 Pruning old releases..."
            ls -dt "$RELEASES"/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Deploy complete — release $TS is live"
