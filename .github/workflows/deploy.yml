name: Deploy Medusa Backend (Aroha House)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup Node
      # -----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------
      # 3. Install dependencies
      # -----------------------------
      - name: Install deps
        run: npm install

      # -----------------------------
      # 4. Build Medusa (IMPORTANT)
      # -----------------------------
      - name: Build
        run: npx medusa build

      # -----------------------------
      # 5. Create bundle
      # -----------------------------
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            dist \
            node_modules \
            package.json \
            medusa-config.ts

      # -----------------------------
      # 6. Upload to EC2
      # -----------------------------
      - name: Upload to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      # -----------------------------
      # 7. Deploy via SSH
      # -----------------------------
      - name: Deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current

            mkdir -p $RELEASES
            cd $BASE

            echo "📦 Creating new release..."
            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            mkdir -p $NEW_RELEASE

            tar -xzf build.tar.gz -C $NEW_RELEASE
            rm build.tar.gz

            cd $NEW_RELEASE

            # -----------------------------
            # ENV SETUP
            # -----------------------------
            echo "⚙️ Writing env..."
            printf "%s\n" "${{ secrets.PROD_ENV_FILE }}" > .env

            export NODE_ENV=production

            set -a
            source .env
            set +a

            # -----------------------------
            # DB MIGRATION
            # -----------------------------
            echo "🗄️ Running migrations..."
            npx medusa db:migrate --execute-safe-links

            # -----------------------------
            # START NEW INSTANCE
            # -----------------------------
            echo "🚀 Starting NEW instance..."
            pm2 start "cd .medusa/server && npx medusa start" \
              --name medusa-temp

            sleep 8

            # -----------------------------
            # HEALTH CHECK
            # -----------------------------
            echo "🧪 Health check..."
            if ! curl -f http://localhost:9000/health; then
              echo "❌ Health failed → rollback"
              pm2 delete medusa-temp
              exit 1
            fi

            # -----------------------------
            # ZERO DOWNTIME SWITCH
            # -----------------------------
            echo "🔁 Switching..."

            pm2 delete medusa || true
            pm2 restart medusa-temp --name medusa

            ln -sfn $NEW_RELEASE $CURRENT
            pm2 save

            # -----------------------------
            # CLEAN OLD RELEASES
            # -----------------------------
            echo "🧹 Cleaning old releases..."
            ls -dt $RELEASES/* | tail -n +4 | xargs rm -rf || true

            echo "✅ DEPLOY SUCCESS"
