name: Deploy Medusa Backend (Aroha House)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node 24 & Corepack (Critical for Yarn 4)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      # 3. Install Dependencies (Using Yarn 4)
      - name: Install deps
        run: yarn install --immutable

      # 4. Build Medusa (Produces the .medusa/server and dist folders)
      - name: Build
        run: npx medusa build

      # 5. Create Bundle
      # Medusa v2 needs the config, source, and lockfile to boot correctly in PM2
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            src \
            node_modules \
            package.json \
            yarn.lock \
            medusa-config.ts \
            tsconfig.json

      # 6. Upload to EC2
      - name: Upload to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      # 7. Deploy via SSH
      - name: Deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Path setup
            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current
            mkdir -p $RELEASES

            # Setup Release Folder
            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            mkdir -p $NEW_RELEASE

            # Unpack
            cd $BASE
            tar -xzf build.tar.gz -C $NEW_RELEASE
            rm build.tar.gz

            cd $NEW_RELEASE

            # 8. ENV SETUP
            echo "⚙️ Writing env..."
            printf "%s\n" "${{ secrets.PROD_ENV_FILE }}" > .env

            # Export for DB Migration step
            export NODE_ENV=production
            set -a && source .env && set +a

            # 9. DB MIGRATION & LINK SYNC
            # Medusa v2 requires --execute-safe-links for custom modules like 'fashion'
            echo "🗄️ Running migrations..."
            npx medusa db:migrate --execute-safe-links

            # 10. START NEW INSTANCE WITH PM2
            # We run 'npx medusa start' from the release root
            echo "🚀 Starting NEW instance..."
            pm2 delete medusa-temp || true
            pm2 start "npx medusa start" --name medusa-temp --env production

            # Wait for boot
            sleep 12

            # 11. HEALTH CHECK
            echo "🧪 Health check..."
            if ! curl -f http://localhost:9000/health; then
              echo "❌ Health failed → rollback"
              pm2 logs medusa-temp --lines 50
              pm2 delete medusa-temp
              exit 1
            fi

            # 12. ZERO DOWNTIME SWITCH
            echo "🔁 Switching versions..."
            pm2 delete medusa || true
            pm2 restart medusa-temp --name medusa

            # Atomic Symlink Switch
            ln -sfn $NEW_RELEASE $CURRENT
            pm2 save

            # 13. CLEAN OLD RELEASES (Keep last 3)
            echo "🧹 Cleaning old releases..."
            ls -dt $RELEASES/* | tail -n +4 | xargs rm -rf || true

            echo "✅ DEPLOY SUCCESS FOR AROHA HOUSE"
