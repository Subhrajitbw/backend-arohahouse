name: Deploy Medusa Backend (Production + Zero Downtime)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - uses: actions/checkout@v4

      # -----------------------------
      # 2. Node setup
      # -----------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------
      # 3. Yarn setup
      # -----------------------------
      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      # -----------------------------
      # 4. Install deps
      # -----------------------------
      - run: yarn install --immutable

      # -----------------------------
      # 5. Build Medusa
      # -----------------------------
      - name: Build
        run: yarn build
        env:
          NODE_ENV: production

      # -----------------------------
      # 6. Create bundle (CRITICAL FIX)
      # -----------------------------
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json \
            medusa-config.ts

      # -----------------------------
      # 7. Upload
      # -----------------------------
      - uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      # -----------------------------
      # 8. Deploy
      # -----------------------------
      - uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current

            mkdir -p $RELEASES
            cd $BASE

            echo "📦 Creating new release..."
            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            mkdir -p $NEW_RELEASE

            tar -xzf build.tar.gz -C $NEW_RELEASE
            rm build.tar.gz

            cd $NEW_RELEASE

            # -----------------------------
            # ENV SETUP (SAFE)
            # -----------------------------
            echo "⚙️ Writing env..."
            printf "%s\n" "${{ secrets.PROD_ENV_FILE }}" > .env

            echo "🌍 Loading env..."
            export NODE_ENV=production

            # Remove bad lines (your previous issue)
            grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env > .env.clean || true
            mv .env.clean .env || true

            set -a
            source .env
            set +a

            # -----------------------------
            # ENV VALIDATION
            # -----------------------------
            echo "🔍 Checking env..."
            : "${DATABASE_URL:?❌ DATABASE_URL missing}"

            echo "✅ DATABASE_URL OK"
            echo "$DATABASE_URL" | cut -c1-60

            # -----------------------------
            # DB CONNECTION TEST
            # -----------------------------
            echo "🔍 Testing DB connection..."

            if ! command -v psql &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y postgresql-client
            fi

            if ! psql "$DATABASE_URL" -c '\q'; then
              echo "❌ DB connection failed"
              exit 1
            fi

            echo "✅ DB connection OK"

            # -----------------------------
            # MIGRATIONS
            # -----------------------------
            echo "🗄️ Running migrations..."
            npx medusa db:migrate --execute-safe-links

                    # -----------------------------
                    # START NEW INSTANCE
                    # -----------------------------
                    echo "🚀 Starting NEW instance..."
                    pm2 start ./node_modules/.bin/medusa \
                      --name medusa-temp \
                      -- start

                    sleep 6

                    echo "🧪 Health check..."
                    if ! curl -f http://localhost:9000/health; then
                      echo "❌ Health failed → rollback"
                      pm2 delete medusa-temp
                      exit 1
                    fi

                    # -----------------------------
                    # SWITCH (ZERO DOWNTIME)
                    # -----------------------------
                    echo "🔁 Switching..."

                    pm2 delete medusa || true
                    pm2 restart medusa-temp --name medusa

                    ln -sfn $NEW_RELEASE $CURRENT

                    pm2 save

                    # -----------------------------
                    # CLEANUP
                    # -----------------------------
                    echo "🧹 Cleaning old releases..."
                    ls -dt $RELEASES/* | tail -n +4 | xargs rm -rf || true

                    echo "✅ DEPLOY SUCCESS"
