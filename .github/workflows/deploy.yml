name: Deploy Aroha Unified

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup Node
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------
      # 3. Setup Yarn 4
      # -----------------------------
      - name: Enable Corepack & Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      # -----------------------------
      # 4. Install Dependencies
      # -----------------------------
      - name: Install Dependencies
        run: yarn install --immutable

      # -----------------------------
      # 5. Build Medusa
      # -----------------------------
      - name: Build Project
        run: yarn build
        env:
          NODE_ENV: production

      # -----------------------------
      # 6. Fix compiled config paths
      # -----------------------------
      - name: Productionize Config
        run: |
          cp .medusa/server/medusa-config.js ./medusa-config.js
          sed -i 's|"\./src/modules/|"\./.medusa/server/src/modules/|g' medusa-config.js
          sed -i "s|'\./src/modules/|'\./.medusa/server/src/modules/|g" medusa-config.js

      # -----------------------------
      # 7. Verify build output
      # -----------------------------
      - name: Verify Build
        run: |
          test -f .medusa/server/public/admin/index.html || (echo "❌ Admin build missing" && exit 1)
          test -f medusa-config.js || (echo "❌ Config missing" && exit 1)

      # -----------------------------
      # 8. Install production deps only
      # -----------------------------
      - name: Prune Dependencies
        run: yarn workspaces focus --all --production

      # -----------------------------
      # 9. Bundle build
      # -----------------------------
      - name: Create Bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json \
            medusa-config.js

      # -----------------------------
      # 10. Upload to EC2
      # -----------------------------
      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/aroha"

      # -----------------------------
      # 11. Deploy on EC2
      # -----------------------------
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            BASE_DIR=/var/www/aroha
            RELEASES_DIR=$BASE_DIR/releases
            CURRENT_DIR=$BASE_DIR/current

            mkdir -p $RELEASES_DIR
            cd $BASE_DIR

            echo "📦 Extracting release..."
            TIMESTAMP=$(date +%s)
            RELEASE_DIR=$RELEASES_DIR/$TIMESTAMP
            mkdir -p $RELEASE_DIR

            tar -xzf build.tar.gz -C $RELEASE_DIR
            rm build.tar.gz

            echo "⚙️ Setting environment..."
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env
            cp $RELEASE_DIR/.env $RELEASE_DIR/.medusa/server/.env

            echo "🔗 Switching symlink..."
            ln -sfn $RELEASE_DIR $CURRENT_DIR

            cd $CURRENT_DIR

            echo "🗄️ Running migrations..."
            export NODE_ENV=production
            npx medusa db:migrate

            echo "🚀 Restarting PM2..."
            pm2 reload aroha || pm2 start ./node_modules/.bin/medusa --name aroha -- start
            pm2 save

            echo "🧹 Cleaning old releases..."
            ls -dt $RELEASES_DIR/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Deployment complete"
