name: Deploy Medusa Backend (Aroha House)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install local deps
        run: yarn install --immutable

      - name: Build Medusa
        run: npx medusa build

      # Optimized Bundle: NO node_modules
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            src \
            package.json \
            yarn.lock \
            medusa-config.ts \
            tsconfig.json \
            .yarnrc.yml

      - name: Upload to server
        uses: appleboy/scp-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # 1. Path Setup
            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current
            mkdir -p $RELEASES

            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            mkdir -p $NEW_RELEASE

            # 2. Extract and Cleanup
            tar -xzf $BASE/build.tar.gz -C $NEW_RELEASE
            rm $BASE/build.tar.gz

            cd $NEW_RELEASE

            # 3. Server-side Install (MUCH faster than SCP)
            echo "­¤ō” Installing dependencies on EC2..."
            sudo corepack enable
            yarn install --immutable

            # 4. Environment Setup
            echo "ŌÜÖ’ĖÅ Writing production env..."
            printf "%s\n" "${{ secrets.PROD_ENV_FILE }}" > .env

            export NODE_ENV=production
            set -a && source .env && set +a

            # 5. Database Migrations & Link Sync
            echo "­¤Śä’ĖÅ Running Medusa v2 migrations..."
            npx medusa db:migrate --execute-safe-links

            # 6. PM2 Process Management
            echo "­¤ÜĆ Starting new instance..."
            # Delete old temp if it exists
            pm2 delete medusa-temp || true

            # Start from the NEW_RELEASE root
            pm2 start "npx medusa start" --name medusa-temp --env production

            echo "­¤¦¬ Waiting 15s for boot..."
            sleep 15

            # 7. Health Check
            if ! curl -f http://localhost:9000/health; then
              echo "ŌØī Health check failed. Rolling back..."
              pm2 logs medusa-temp --lines 50
              pm2 delete medusa-temp
              exit 1
            fi

            # 8. Zero-Downtime Atomic Switch
            echo "­¤öü Switching versions..."
            pm2 delete medusa || true
            pm2 restart medusa-temp --name medusa

            # Update Symlink
            ln -sfn $NEW_RELEASE $CURRENT
            pm2 save

            # 9. Cleanup old releases (Keep last 3)
            ls -dt $RELEASES/* | tail -n +4 | xargs rm -rf || true

            echo "Ō£ģ DEPLOY SUCCESS FOR AROHA HOUSE"
