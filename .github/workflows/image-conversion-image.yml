name: Build Image Conversion Runner

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/image-conversions/**"
      - "docker/image-conversion/**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - run: |
          echo "IMAGE_TAG=ghcr.io/${{ env.IMAGE_REPO }}/image-conversion:latest" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/image-conversion/Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}