name: Deploy Medusa Backend (Zero Downtime)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - uses: actions/checkout@v4

      # -----------------------------
      # 2. Node + Yarn
      # -----------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      # -----------------------------
      # 3. Install + Build
      # -----------------------------
      - run: yarn install --immutable

      - name: Build
        run: yarn build
        env:
          NODE_ENV: production

      # -----------------------------
      # 4. Bundle
      # -----------------------------
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json

      # -----------------------------
      # 5. Upload
      # -----------------------------
      - uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      # -----------------------------
      # 6. Deploy (ZERO DOWNTIME)
      # -----------------------------
      - uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current

            mkdir -p $RELEASES
            cd $BASE

            echo "📦 Creating new release..."
            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            mkdir -p $NEW_RELEASE

            tar -xzf build.tar.gz -C $NEW_RELEASE
            rm build.tar.gz

            cd $NEW_RELEASE

            echo "⚙️ Writing env..."
            cat << 'EOF' > .env
            ${{ secrets.PROD_ENV_FILE }}
            EOF

            echo "🌍 Loading env..."
            export NODE_ENV=production
            export $(grep -v '^#' .env | xargs)

            echo "🧪 Running migrations (SAFE CHECK)..."
            if ! npx medusa db:migrate; then
              echo "❌ Migration failed. Aborting deploy."
              exit 1
            fi

            echo "🚀 Starting NEW instance (temp)..."
            pm2 start ./node_modules/.bin/medusa \
              --name medusa-temp \
              -- start

            sleep 5

            echo "🧪 Health check..."
            if ! curl -f http://localhost:9000/health; then
              echo "❌ Health check failed. Rolling back..."
              pm2 delete medusa-temp
              exit 1
            fi

            echo "🔁 Swapping to new version..."

            # Stop old process AFTER new is healthy
            pm2 delete medusa || true

            # Rename temp → main
            pm2 restart medusa-temp --name medusa

            # Update symlink ONLY after success
            ln -sfn $NEW_RELEASE $CURRENT

            pm2 save

            echo "🧹 Cleaning old releases..."
            ls -dt $RELEASES/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Zero-downtime deploy complete"
