name: Deploy Aroha House Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack & Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Project
        # This builds the backend into .medusa/server and admin into .medusa/admin
        run: yarn build
        env:
          NODE_ENV: production

      - name: Prepare Production Config
        # We pull the ALREADY TRANSPILED config out of the build folder.
        # This config already has the correct paths for your compiled modules.
        run: cp .medusa/server/medusa-config.js ./medusa-config.js

      - name: Verify Artifacts
        run: |
          test -f .medusa/admin/index.html || (echo "❌ Admin build missing" && exit 1)
          test -f medusa-config.js || (echo "❌ Compiled config missing" && exit 1)
          echo "✅ All production artifacts verified."

      - name: Prune to Production Dependencies
        run: yarn workspaces focus --all --production

      - name: Create Deployment Bundle
        # NO 'src', NO '.ts'. Just the compiled code and runtime dependencies.
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json \
            medusa-config.js

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/medusa

            echo "📦 Extracting new release..."
            mkdir -p releases
            TIMESTAMP=$(date +%s)
            RELEASE_DIR="releases/$TIMESTAMP"
            mkdir -p $RELEASE_DIR

            tar -xzf build.tar.gz -C $RELEASE_DIR
            rm build.tar.gz

            echo "⚙️ Setting environment..."
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env

            echo "🔗 Switching symlink..."
            ln -sfn $RELEASE_DIR current

            echo "🗄 Running migrations..."
            cd current
            # Since we are using a JS config, this is lightning fast
            ./node_modules/.bin/medusa db:migrate

            echo "🚀 Restarting PM2..."
            pm2 delete medusa || true

            # We use 'medusa start' which will now find 'medusa-config.js' automatically
            pm2 start ./node_modules/.bin/medusa --name medusa --max-memory-restart 800M -- start
            pm2 save

            echo "🧹 Cleaning old releases..."
            ls -dt releases/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Aroha House is Live (Production Grade)!"
