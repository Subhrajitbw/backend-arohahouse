name: Deploy Aroha House Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack & Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build project
        run: yarn build
        env:
          NODE_ENV: production

      - name: Focus Production Dependencies
        run: yarn workspaces focus --all --production

      - name: Create Deployment Bundle
        # Changed medusa-config.js to medusa-config.ts
        # Included both just to be 100% safe
        run: |
          tar -czf build.tar.gz \
            .medusa \
            node_modules \
            package.json \
            yarn.lock \
            .yarnrc.yml \
            medusa-config.ts

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/medusa

            echo "📦 Preparing release..."
            mkdir -p releases
            RELEASE_DIR="releases/$(date +%s)"
            mkdir -p $RELEASE_DIR

            tar -xzf build.tar.gz -C $RELEASE_DIR
            rm build.tar.gz

            echo "⚙️ Setting environment..."
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env
            # Medusa v2 often looks inside the server folder for env
            cp $RELEASE_DIR/.env $RELEASE_DIR/.medusa/server/.env

            echo "🔗 Switching to new release..."
            ln -sfn $RELEASE_DIR current

            echo "🗄 Running migrations..."
            cd current
            # Use the local binary to ensure version matching
            ./node_modules/.bin/medusa db:migrate

            echo "🚀 Restarting PM2..."
            pm2 delete medusa || true
            # Added --max-memory-restart to protect your T3.micro
            pm2 start ./node_modules/.bin/medusa --name medusa --max-memory-restart 800M -- start
            pm2 save

            echo "🧹 Cleaning old releases..."
            ls -dt releases/* | tail -n +4 | xargs rm -rf || true

            echo "✅ Deployment complete"
