name: Deploy Medusa v2 (Atomic & Optimized)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Medusa
        run: yarn build
        env:
          NODE_ENV: production

      - name: Create Slim Bundle
        run: |
          # Package the built server and essential configs
          # Excludes root node_modules to keep the transfer lightweight
          tar -czf build.tar.gz \
            .medusa/server \
            package.json \
            medusa-config.ts \
            yarn.lock \
            .yarnrc.yml

      - name: Upload to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa/tmp"

      - name: Atomic Deploy & PM2 Health Check
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export NODE_OPTIONS="--max-old-space-size=512"
            
            BASE_DIR="/var/www/medusa"
            TIMESTAMP=$(date +%s)
            RELEASE_DIR="$BASE_DIR/releases/$TIMESTAMP"
            STAGING_PORT=9001
            
            # 1. Prepare Release Directory
            mkdir -p $RELEASE_DIR
            mkdir -p $BASE_DIR/shared/node_modules
            tar -xzf $BASE_DIR/tmp/build.tar.gz -C $RELEASE_DIR
            rm $BASE_DIR/tmp/build.tar.gz

            # 2. Setup Environment & Dependency Symlink
            echo "${{ secrets.PROD_ENV_FILE }}" > $RELEASE_DIR/.env
            ln -s $BASE_DIR/shared/node_modules $RELEASE_DIR/node_modules

            # 3. Optimized Production Install
            cd $RELEASE_DIR
            corepack enable
            yarn install --production --immutable

            # 4. Run Medusa v2 Migrations
            npx medusa db:migrate

            # 5. Start Staging Instance in PM2
            # This verifies the NEW code works without touching the LIVE site
            cd .medusa/server
            pm2 delete medusa-staging >/dev/null 2>&1 || true
            PORT=$STAGING_PORT pm2 start "node dist/index.js" --name "medusa-staging" --no-autorestart

            # 6. Intelligent Health Check Loop
            MAX_RETRIES=20
            RETRY_COUNT=0
            SUCCESS=false

            echo "⏳ Monitoring PM2 process and Health Endpoint..."

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              # Verify PM2 status via JSON output
              PM2_STATUS=$(pm2 jlist | jq -r '.[] | select(.name=="medusa-staging") | .pm2_env.status')
              
              if [ "$PM2_STATUS" = "online" ]; then
                # Check if Medusa is responding on the staging port
                HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$STAGING_PORT/health || echo "000")
                
                if [ "$HTTP_STATUS" -eq "200" ]; then
                  echo "✅ Staging Health Check Passed (Status 200)!"
                  SUCCESS=true
                  break
                fi
              elif [ "$PM2_STATUS" = "errored" ] || [ "$PM2_STATUS" = "stopped" ]; then
                echo "❌ PM2 process entered '$PM2_STATUS' state."
                break
              fi

              echo "Wait for boot... ($((RETRY_COUNT+1))/$MAX_RETRIES)"
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep 10
            done

            if [ "$SUCCESS" = false ]; then
              echo "❌ Deployment Failed: New release is unstable."
              pm2 logs medusa-staging --lines 50 --nostream
              pm2 delete medusa-staging
              exit 1
            fi

            # 7. Atomic Swap: Update the 'current' symlink
            pm2 delete medusa-staging
            ln -sfn $RELEASE_DIR $BASE_DIR/current

            # 8. Reload Production PM2 (Zero Downtime)
            cd $BASE_DIR/current/.medusa/server
            if pm2 describe medusa >/dev/null 2>&1; then
              pm2 reload medusa --update-env
            else
              # Initial start if this is the first run
              pm2 start "node dist/index.js" --name "medusa"
            fi
            pm2 save

            # 9. Storage & Cache Optimization
            # Delete everything except the 3 most recent releases
            cd $BASE_DIR/releases
            ls -1t | tail -n +4 | xargs rm -rf || true
            
            # Clear Yarn cache to free up hundreds of MBs on small EBS volumes
            yarn cache clean
            
            echo "🚀 Medusa v2 Deployment Successful!"