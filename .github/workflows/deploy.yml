name: Deploy Medusa Backend (Aroha House)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Use Node 20 (IMPORTANT)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Enable Corepack (for Yarn)
      - name: Enable Corepack
        run: corepack enable

      # 4. Install dependencies
      - name: Install local deps
        run: yarn install --immutable

      # 5. Build Medusa (creates .medusa/server)
      - name: Build Medusa
        run: |
          npx medusa build
          ls -la .medusa/server

      # 6. Create bundle (NO node_modules)
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            package.json \
            yarn.lock

      # 7. Upload to EC2
      - name: Upload to server
        uses: appleboy/scp-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      # 8. Deploy on server
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current

            mkdir -p $RELEASES

            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            mkdir -p $NEW_RELEASE

            # Extract build
            tar -xzf $BASE/build.tar.gz -C $NEW_RELEASE
            rm $BASE/build.tar.gz

            # 🔥 MOVE INTO BUILT SERVER
            cd $NEW_RELEASE/.medusa/server

            echo "📦 Installing production deps..."
            sudo corepack enable
            yarn install --production

            # ENV setup
            echo "⚙️ Writing env..."
            printf "%s\n" "${{ secrets.PROD_ENV_FILE }}" > .env.production

            export NODE_ENV=production
            export MEDUSA_WORKER_MODE=server

            set -a
            source .env.production
            set +a

            # DB migration
            echo "🗄️ Running migrations..."
            npx medusa db:migrate --execute-safe-links

            # PM2 start
            echo "🚀 Starting server..."

            pm2 delete medusa-temp || true

            pm2 start main.js --name medusa-temp

            echo "⏳ Waiting for boot..."
            sleep 20

            # Health check
            if ! curl -f http://localhost:9000/health; then
              echo "❌ Health failed"
              pm2 logs medusa-temp --lines 100
              pm2 delete medusa-temp
              exit 1
            fi

            # Switch (zero downtime)
            echo "🔁 Switching versions..."
            pm2 delete medusa || true
            pm2 restart medusa-temp --name medusa

            # Symlink update
            ln -sfn $NEW_RELEASE $CURRENT
            pm2 save

            # Cleanup (keep last 3)
            ls -dt $RELEASES/* | tail -n +4 | xargs rm -rf || true

            echo "✅ DEPLOY SUCCESS"
