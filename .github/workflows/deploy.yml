name: Deploy Medusa Backend to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1) Checkout repo
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # 2) Setup Node.js
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------
      # 3) Enable Corepack
      # -----------------------------
      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      # -----------------------------
      # 4) Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: yarn install --immutable

      # -----------------------------
      # 5) Build backend ONLY (IMPORTANT)
      # -----------------------------
      - name: Build Medusa backend only
        run: npx medusa build 
        env:
          NODE_ENV: production

      # -----------------------------
      # 6) Package build
      # -----------------------------
      - name: Create build bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            src \
            package.json \
            yarn.lock \
            medusa-config.ts \
            tsconfig.json \
            .yarnrc.yml

      # -----------------------------
      # 7) Copy to EC2
      # -----------------------------
      - name: Copy bundle to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      # -----------------------------
      # 8) Deploy on EC2
      # -----------------------------
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /var/www/medusa

            echo "🚀 Starting deployment..."

            # -----------------------------
            # BACKUP (ROLLBACK SAFETY)
            # -----------------------------
            if [ -d ".medusa" ]; then
              rm -rf .medusa_backup || true
              cp -r .medusa .medusa_backup
            fi

            # -----------------------------
            # CLEAN OLD FILES
            # -----------------------------
            rm -f medusa-config.js medusa-config.cjs medusa-config.mjs
            rm -rf src

            # -----------------------------
            # EXTRACT BUILD
            # -----------------------------
            if [ -f build.tar.gz ]; then
              tar -xzf build.tar.gz
              rm build.tar.gz
            fi

            # -----------------------------
            # ENV FILE
            # -----------------------------
            cat << 'EOF' > .env.production
            ${{ secrets.PROD_ENV_FILE }}
            EOF

            # -----------------------------
            # FIX YARN VERSION
            # -----------------------------
            if command -v yarn >/dev/null 2>&1; then
              YVER=$(yarn -v || echo "0")
              case "$YVER" in
                1.*)
                  sudo rm -f /usr/local/bin/yarn /usr/local/bin/yarnpkg || true
                  ;;
              esac
            fi

            corepack enable

            # -----------------------------
            # INSTALL ROOT DEPS
            # -----------------------------
            yarn install --immutable

            # -----------------------------
            # RUN MIGRATIONS
            # -----------------------------
            yarn medusa db:migrate --execute-safe-links

            # -----------------------------
            # MOVE TO BUILT SERVER
            # -----------------------------
            cd .medusa/server

            cp /var/www/medusa/.env.production .env.production

            yarn install --immutable

            # -----------------------------
            # MEMORY LIMIT (t2.micro)
            # -----------------------------
            export NODE_OPTIONS="--max-old-space-size=512"

            # -----------------------------
            # HEALTH CHECK
            # -----------------------------
            PORT=9001 yarn start &
            TEMP_PID=$!

            sleep 8

            if curl -f http://localhost:9001/health; then
              kill $TEMP_PID || true
            else
              echo "❌ Health check failed, rolling back..."

              kill $TEMP_PID || true

              cd /var/www/medusa
              rm -rf .medusa
              mv .medusa_backup .medusa

              cd .medusa/server
              pm2 reload medusa

              exit 1
            fi

            # -----------------------------
            # PM2 START / RELOAD
            # -----------------------------
            if pm2 describe medusa >/dev/null 2>&1; then
              pm2 reload medusa
            else
              pm2 start yarn --name "medusa" -- start
            fi

            pm2 save

            # -----------------------------
            # MEMORY AUTO RESTART
            # -----------------------------
            pm2 restart medusa --max-memory-restart 450M

            # -----------------------------
            # CLEANUP
            # -----------------------------
            rm -rf ~/.cache/yarn || true
            rm -rf node_modules/.cache || true
            pm2 flush

            echo "✅ Deployment complete!"