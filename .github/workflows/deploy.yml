name: Deploy Medusa Backend (Aroha House)

on:
  workflow_dispatch: # 🔥 MANUAL TRIGGER ONLY

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node 20 (stable for Medusa)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Enable Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Install deps
      - name: Install dependencies
        run: yarn install --immutable

      # 5. Build Medusa
      - name: Build Medusa
        run: |
          npx medusa build
          ls -la .medusa/server

      # 6. Create bundle
      - name: Create bundle
        run: |
          tar -czf build.tar.gz \
            .medusa \
            package.json \
            yarn.lock

      # 7. Upload to EC2
      - name: Upload to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/var/www/medusa"

      # 8. Deploy via SSH
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            BASE=/var/www/medusa
            RELEASES=$BASE/releases
            CURRENT=$BASE/current

            mkdir -p $RELEASES

            TS=$(date +%s)
            NEW_RELEASE=$RELEASES/$TS
            mkdir -p $NEW_RELEASE

            echo "📦 Extracting..."
            tar -xzf $BASE/build.tar.gz -C $NEW_RELEASE
            rm $BASE/build.tar.gz

            cd $NEW_RELEASE/.medusa/server

            echo "📦 Installing deps..."
            sudo corepack enable
            yarn install

            echo "⚙️ Setting env..."
            printf "%s\n" "${{ secrets.PROD_ENV_FILE }}" > .env.production

            export NODE_ENV=production
            export MEDUSA_WORKER_MODE=server

            set -a
            source .env.production
            set +a

            echo "🗄️ Running migrations..."
            npx medusa db:migrate --execute-safe-links

            echo "🚀 Starting server..."
            pm2 delete medusa-temp || true
            pm2 start main.js --name medusa-temp

            sleep 20

            echo "🧪 Health check..."
            if ! curl -f http://localhost:9000/health; then
              echo "❌ Health failed"
              pm2 logs medusa-temp --lines 100
              pm2 delete medusa-temp
              exit 1
            fi

            echo "🔁 Switching..."
            pm2 delete medusa || true
            pm2 restart medusa-temp --name medusa

            ln -sfn $NEW_RELEASE $CURRENT
            pm2 save

            echo "🧹 Cleaning old releases..."
            ls -dt $RELEASES/* | tail -n +4 | xargs rm -rf || true

            echo "✅ DEPLOY SUCCESS"
