name: Deploy Medusa Admin to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-admin:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup Node
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------
      # 3. Enable Corepack (Yarn 4)
      # -----------------------------
      - name: Enable Corepack
        run: corepack enable

      # -----------------------------
      # 4. Install deps
      # -----------------------------
      - name: Install dependencies
        run: yarn install --immutable

      # -----------------------------
      # 5. Build Admin (IMPORTANT)
      # -----------------------------
      - name: Build Medusa Admin
        run: yarn build:admin
        env:
          MEDUSA_ADMIN_BACKEND_URL: https://api.arohahouse.com

      # -----------------------------
      # 6. Install Vercel CLI
      # -----------------------------
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # -----------------------------
      # 7. Pull Vercel project config
      # -----------------------------
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # -----------------------------
      # 8. Build using Vercel system
      # -----------------------------
      - name: Vercel Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # -----------------------------
      # 9. Deploy prebuilt output
      # -----------------------------
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Deployed to $DEPLOY_URL"

      # -----------------------------
      # 10. (Optional) Log URL
      # -----------------------------
      - name: Output Deployment URL
        run: echo "Admin deployed at $DEPLOY_URL"